name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: '%compiler% -dumpmachine; %compiler% -dumpversion'
      CCACHE_NOHASHDIR: 'true'
      CCACHE_HARDLINK: 'true'
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write signing key
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        shell: bash
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEY_STORE" ]; then
            {
              echo "androidStorePassword=$KEY_STORE_PASSWORD"
              echo "androidKeyAlias=$ALIAS"
              echo "androidKeyPassword=$KEY_PASSWORD"
              echo "androidStoreFile=key.jks"
            } >> gradle.properties

            printf '%s' "$KEY_STORE" | base64 --decode > key.jks
            chmod 600 key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: 1.12.0

      - name: Remove Android SDK CMake
        shell: bash
        run: rm -rf "$ANDROID_HOME/cmake"

      - name: Set short commit id
        shell: bash
        run: echo "commit=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build with Gradle
        shell: bash
        run: |
          {
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.jvmargs=-Xmx2048m'
            echo 'android.native.buildOutput=verbose'
          } >> gradle.properties

          ./gradlew buildAll

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: lspatch-debug-${{ env.commit }}
          path: out/debug/*
          if-no-files-found: warn

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lspatch-release-${{ env.commit }}
          path: out/release/*
          if-no-files-found: warn

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: mappings-${{ env.commit }}
          path: |
            patch-loader/build/outputs/mapping
            manager/build/outputs/mapping
          if-no-files-found: warn

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: symbols-${{ env.commit }}
          path: |
            patch-loader/build/symbols
          if-no-files-found: warn

      - name: Post to channel
        if: ${{ github.event_name != 'pull_request' && success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && false }}
        shell: bash
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DISCUSSION_ID: ${{ secrets.DISCUSSION_ID }}
          TOPIC_ID: ${{ secrets.TOPIC_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            jarRelease="$(find out/release -type f -name "*.jar" | head -n 1)"
            managerRelease="$(find out/release -type f -name "*.apk" | head -n 1)"
            jarDebug="$(find out/debug -type f -name "*.jar" | head -n 1)"
            managerDebug="$(find out/debug -type f -name "*.apk" | head -n 1)"

            if [ -z "$jarRelease" ] || [ -z "$managerRelease" ] || [ -z "$jarDebug" ] || [ -z "$managerDebug" ]; then
              echo "One or more Telegram upload artifacts were not found."
              echo "jarRelease=$jarRelease"
              echo "managerRelease=$managerRelease"
              echo "jarDebug=$jarDebug"
              echo "managerDebug=$managerDebug"
              exit 1
            fi

            media_json="$(python3 - <<'PY'
import json
import os

msg = os.environ.get("COMMIT_MESSAGE", "")
url = os.environ.get("COMMIT_URL", "")

caption = msg if len(msg) <= 1024 else url

media = [
    {
        "type": "document",
        "media": "attach://jarRelease",
    },
    {
        "type": "document",
        "media": "attach://managerRelease",
    },
    {
        "type": "document",
        "media": "attach://jarDebug",
    },
    {
        "type": "document",
        "media": "attach://managerDebug",
        "caption": caption,
    },
]

print(json.dumps(media))
PY
)"

            curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup" \
              -F "chat_id=${CHANNEL_ID}" \
              -F "media=${media_json}" \
              -F "jarRelease=@${jarRelease}" \
              -F "managerRelease=@${managerRelease}" \
              -F "jarDebug=@${jarDebug}" \
              -F "managerDebug=@${managerDebug}"
          fi
