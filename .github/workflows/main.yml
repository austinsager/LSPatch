name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: '%compiler% -dumpmachine; %compiler% -dumpversion'
      CCACHE_NOHASHDIR: 'true'
      CCACHE_HARDLINK: 'true'
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$KEY_STORE" ]; then
            {
              echo "androidStorePassword=$KEY_STORE_PASSWORD"
              echo "androidKeyAlias=$ALIAS"
              echo "androidKeyPassword=$KEY_PASSWORD"
              echo "androidStoreFile=key.jks"
            } >> gradle.properties

            printf '%s' "$KEY_STORE" | base64 --decode > key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: 1.12.0

      - name: Remove Android's cmake
        shell: bash
        run: rm -rf "$ANDROID_HOME/cmake"

      - name: Set short commit id
        shell: bash
        run: echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build with Gradle
        shell: bash
        run: |
          {
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.jvmargs=-Xmx2048m'
            echo 'android.native.buildOutput=verbose'
          } >> gradle.properties

          ./gradlew buildAll

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: lspatch-debug-${{ env.commit }}
          path: out/debug/*

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lspatch-release-${{ env.commit }}
          path: out/release/*

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: mappings-${{ env.commit }}
          path: |
            patch-loader/build/outputs/mapping
            manager/build/outputs/mapping

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: symbols-${{ env.commit }}
          path: |
            patch-loader/build/symbols

      - name: Post to channel
        if: ${{ github.event_name != 'pull_request' && success() && github.ref == 'refs/heads/master' && false }}
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DISCUSSION_ID: ${{ secrets.DISCUSSION_ID }}
          TOPIC_ID: ${{ secrets.TOPIC_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        shell: bash
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            jarRelease="$(find out/release -name "*.jar" | head -n 1)"
            managerRelease="$(find out/release -name "*.apk" | head -n 1)"
            jarDebug="$(find out/debug -name "*.jar" | head -n 1)"
            managerDebug="$(find out/debug -name "*.apk" | head -n 1)"

            ESCAPED="$(python3 -c '
import json
import os
import urllib.parse

msg = os.environ["COMMIT_MESSAGE"]
url = os.environ["COMMIT_URL"]

caption = msg if len(msg) <= 1024 else url
print(urllib.parse.quote(json.dumps(caption)))
')"

            curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup?chat_id=${CHANNEL_ID}&media=%5B%7B%22type%22%3A%22document%22%2C%22media%22%3A%22attach%3A%2F%2FjarRelease%22%7D%2C%7B%22type%22%3A%22document%22%2C%22media%22%3A%22attach%3A%2F%2FmanagerRelease%22%7D%2C%7B%22type%22%3A%22document%22%2C%22media%22%3A%22attach%3A%2F%2FjarDebug%22%7D%2C%7B%22type%22%3A%22document%22%2C%22media%22%3A%22attach%3A%2F%2FmanagerDebug%22%2C%22caption%22%3A${ESCAPED}%7D%5D" \
              -F jarRelease="@$jarRelease" \
              -F managerRelease="@$managerRelease" \
              -F jarDebug="@$jarDebug" \
              -F managerDebug="@$managerDebug"
          fi
